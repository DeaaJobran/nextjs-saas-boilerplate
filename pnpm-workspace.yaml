packages:
  - apps/*
  - packages/*

allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  sharp: true
  unrs-resolver: true
minimumReleaseAge: 1440
overrides:
  "@esbuild-kit/core-utils>esbuild": ^0.25.12
  postcss: ^8.5.16
trustPolicy: no-downgrade
trustPolicyExclude:
  - eslint-import-resolver-typescript@3.10.1
  - semver@6.3.1
  - undici-types@6.21.0
