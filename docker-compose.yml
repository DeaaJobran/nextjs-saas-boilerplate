services:
  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${SMTP_WEB_PORT:-8025}:8025"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2026-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped
    volumes:
      - minio-data:/data

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextjs_saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextjs_saas}
      POSTGRES_USER: ${POSTGRES_USER:-nextjs_saas}
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      retries: 10
      start_period: 10s
      timeout: 5s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
      start_period: 5s
      timeout: 5s
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  minio-data:
  postgres-data:
  redis-data:
