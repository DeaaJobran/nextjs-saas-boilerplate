name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nextjs_saas
          POSTGRES_PASSWORD: nextjs_saas
          POSTGRES_USER: nextjs_saas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nextjs_saas -d nextjs_saas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://nextjs_saas:nextjs_saas@127.0.0.1:5432/nextjs_saas

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare database
        run: |
          pnpm db:migrate
          pnpm db:seed

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate
        run: pnpm validate
